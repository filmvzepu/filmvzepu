<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Film v žepu | Filmske delavnice za mlade</title>

  <link rel="icon" type="image/png" href="FilmVzepu_Favicon_Transparent.png?v=2">

  <meta name="description" content="Praktične filmske delavnice za mlade. Ustvarjanje kratkih filmov s telefonom: ideja, snemanje, montaža in pripovedovanje zgodb.">

  <style>
    body {
      margin: 0;
      font-family: "Helvetica World", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      color: #111;
    }

    .container {
      max-width: 760px;
      padding: 32px 20px;
    }

    .logo {
      max-width: 420px;
      width: 100%;
      margin-bottom: 22px;
    }

    .intro {
      margin-bottom: 28px;
    }

    .intro p {
      font-size: 19px;
      line-height: 1.45;
      margin: 0 auto;
      font-weight: 700;
      letter-spacing: -0.01em;
      max-width: 680px;
    }

    .workshop-block {
      margin-bottom: 24px;
      padding: 24px 20px;
      background: #ffffff;
      border: 2px solid #d01919;
      border-radius: 16px;
    }

    .workshop-block h2 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
      color: #d01919;
      letter-spacing: -0.02em;
    }

    .workshop-block p {
      margin: 6px 0;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 500;
    }

    .newsletter-form {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-top: 16px;
    }

    .newsletter-form input {
      padding: 13px 14px;
      min-width: 240px;
      border: 2px solid #111;
      border-radius: 0;
      font-size: 15px;
      font-family: "Helvetica World", "Helvetica Neue", Helvetica, Arial, sans-serif;
    }

    .newsletter-form button {
      cursor: pointer;
    }

    .button {
      padding: 14px 24px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      font-family: "Helvetica World", "Helvetica Neue", Helvetica, Arial, sans-serif;
      border: 2px solid black;
      transition: 0.25s ease;
      letter-spacing: -0.01em;
      display: inline-block;
    }

    .primary {
      background: #d01919;
      color: white;
      border-color: #d01919;
    }

    .primary:hover {
      background: #b51616;
      border-color: #b51616;
    }

    .secondary {
      background: transparent;
      color: #1d33d6;
    }

    .secondary:hover {
      background: black;
      color: white;
      border-color: black;
    }

    .social-text {
      margin: 0 auto 16px;
      max-width: 560px;
      font-size: 16px;
      line-height: 1.45;
      font-weight: 700;
    }

    .social-links {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 22px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .social-icon-link {
      width: 46px;
      height: 46px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      transition: 0.2s ease;
    }

    .social-icon-link:hover {
      transform: translateY(-2px);
      opacity: 0.85;
    }

    .social-icon {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
      display: block;
    }

    .footer {
      margin-top: 28px;
      font-size: 13px;
      line-height: 1.4;
      font-weight: 500;
      color: #555;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px 18px;
      }

      .logo {
        max-width: 320px;
        margin-bottom: 18px;
      }

      .intro p {
        font-size: 17px;
      }

      .workshop-block h2 {
        font-size: 20px;
      }

      .workshop-block p,
      .social-text {
        font-size: 15px;
      }

      .newsletter-form input {
        width: 100%;
        min-width: 0;
      }

      .newsletter-form button {
        width: 100%;
      }

      .button {
        font-size: 15px;
        padding: 12px 20px;
      }

      .social-icon-link {
        width: 42px;
        height: 42px;
      }

      .footer {
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <div class="container">

    <img src="FilmVzepu_LajnerText_Transparent.png" alt="Film v žepu - filmske delavnice za mlade" class="logo">

    <div class="intro">
      <p>
        Filmske delavnice za mlade, kjer iz telefona, ideje in zgodbe nastane kratek film.
      </p>
    </div>

    <div class="workshop-block">
      <h2>Prejmi obvestilo o naslednji delavnici</h2>
      <p>
        Pusti svoj e-mail in obvestili te bomo, ko bo razpisan nov brezplačen termin.
      </p>

      <form class="newsletter-form" onsubmit="subscribeToNewsletter(event)">
        <input type="email" name="email" placeholder="Tvoj e-mail" required>
        <button type="submit" class="button primary">Obvesti me</button>
      </form>
    </div>

    <p class="social-text">
      Spremljaj nas na družbenih omrežjih.
    </p>

    <div class="social-links">
      <a href="https://www.instagram.com/filmvzepu/" target="_blank" class="social-icon-link" aria-label="Film v žepu na Instagramu">
        <img src="instagram-logo.png" alt="Instagram" class="social-icon">
      </a>

      <a href="https://www.tiktok.com/@filmvzepu" target="_blank" class="social-icon-link" aria-label="Film v žepu na TikToku">
        <img src="tiktok-logo.png" alt="TikTok" class="social-icon">
      </a>

      <a href="mailto:filmvzepu@gmail.com" class="button secondary">
        Piši nam
      </a>
    </div>

    <footer class="footer">
      © Film v žepu · Ljubljana · Slovenija
    </footer>

  </div>

  <script>
    const newsletterUrl = "https://magic.beehiiv.com/v1/8b7389c4-2b47-40eb-9591-e5b50c3617b1?email={{email}}";

    function subscribeToNewsletter(event) {
      event.preventDefault();

      const form = event.target;
      const email = form.querySelector('input[name="email"]').value.trim();

      if (!email) return;

      const finalUrl = newsletterUrl.replace("{{email}}", encodeURIComponent(email));

      window.open(finalUrl, "_blank");
      form.reset();
    }
  </script>
</body>
</html>
