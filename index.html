<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Film v žepu</title>
  <link rel="icon" type="image/png" href="FilmVzepu_Favicon_Transparent.png?v=2">
  <meta name="description" content="Delavnice filmskega ustvarjanja za radovedne mlade.">

  <style>
    body {
      margin: 0;
      font-family: "Helvetica World", "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f5f5f5;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      text-align: center;
      color: #111;
    }

    .container {
      max-width: 700px;
      padding: 32px 20px;
    }

    .logo {
      max-width: 420px;
      width: 100%;
      margin-bottom: 22px;
    }

    .intro {
      margin-bottom: 28px;
    }

    .intro p {
      font-size: 20px;
      line-height: 1.35;
      margin: 0;
      font-weight: 500;
      letter-spacing: -0.01em;
    }

    .intro p + p {
      margin-top: 8px;
    }

    .workshop-block {
      margin-bottom: 28px;
      padding: 22px 18px;
      background: #ffffff;
      border: 2px solid #d01919;
      border-radius: 16px;
    }

    .workshop-block h2 {
      margin: 0 0 10px;
      font-size: 22px;
      line-height: 1.2;
      font-weight: 700;
      color: #d01919;
      letter-spacing: -0.02em;
    }

    .workshop-block p {
      margin: 4px 0;
      font-size: 16px;
      line-height: 1.4;
      font-weight: 500;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .button {
      padding: 14px 28px;
      text-decoration: none;
      font-weight: 700;
      font-size: 16px;
      font-family: "Helvetica World", "Helvetica Neue", Helvetica, Arial, sans-serif;
      border: 2px solid black;
      transition: 0.25s ease;
      letter-spacing: -0.01em;
    }

    .primary {
      background: #d01919;
      color: white;
      border: none;
    }

    .primary:hover {
      background: #b51616;
    }

    .secondary {
      background: transparent;
      color: #1d33d6;
    }

    .secondary:hover {
      background: black;
      color: white;
      border-color: black;
    }

    @media (max-width: 600px) {
      .container {
        padding: 24px 18px;
      }

      .logo {
        max-width: 320px;
        margin-bottom: 18px;
      }

      .intro p {
        font-size: 18px;
      }

      .workshop-block h2 {
        font-size: 20px;
      }

      .workshop-block p {
        font-size: 15px;
      }

      .button {
        font-size: 15px;
        padding: 12px 22px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    
    <img src="FilmVzepu_LajnerText_Transparent.png" alt="Film v žepu" class="logo">

    <div class="intro">
      <p>Od ideje do filma v enem tednu.</p>
      <p>Vzemi telefon in povej svojo zgodbo.</p>
    </div>

    <div class="workshop-block">
      <h2>Brezplačna filmska delavnica</h2>
      <p>27.4. – 1.5. 2026 · 10:00–13:00</p>
      <p>Center Rog, Ljubljana · 15–29 let</p>
    </div>

    <div class="buttons">
      <a href="https://forms.gle/XToAP7McpmsK61ts9" target="_blank" class="button primary">
        Prijavi se
      </a>

      <a href="mailto:info@filmvzepu.com" class="button secondary">
        Piši nam
      </a>
    </div>

  </div>
</body>
</html>
